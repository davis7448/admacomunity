<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - ADMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>body { font-family: 'Space Grotesk', sans-serif; }</style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md text-center">
        <span class="material-symbols-outlined text-6xl text-yellow-400">hub</span>
        <h1 class="text-3xl font-bold mt-4">ADMA Setup</h1>
        <p class="text-yellow-400 text-sm uppercase tracking-widest mt-1">Iniciar sesión</p>
        
        <div id="status" class="glass rounded-2xl p-8 mt-6">
            <button id="loginBtn" class="w-full bg-white text-gray-900 font-bold py-3 px-4 rounded-xl hover:bg-gray-100 transition">
                Iniciar con Google
            </button>
        </div>
        
        <div id="result" class="mt-4 text-sm text-gray-400"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDXz1Nza6ehNYaIv2i7el6pomjtNY2UHX0",
            authDomain: "adma-communities.firebaseapp.com",
            projectId: "adma-communities",
            storageBucket: "adma-communities.firebasestorage.app",
            messagingSenderId: "822839151563",
            appId: "1:822839151563:web:f043fa3e4e6a5fc43d044e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const expectedUID = "OE76oNlJxQOQh6rupR0r3nBLXBg1";
        
        document.getElementById('loginBtn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            });
        };
        
        auth.onAuthStateChanged(async (user) => {
            document.getElementById('result').textContent = 'Usuario: ' + (user ? user.uid : 'ninguno');
            
            if (!user) return;
            
            document.getElementById('status').innerHTML = '<p class="text-yellow-400">Procesando...</p>';
            
            // Check UID
            if (user.uid !== expectedUID) {
                document.getElementById('status').innerHTML = '<p class="text-red-400">UID no coincide. Cierra sesión y usa tu cuenta.</p><p class="text-sm text-gray-400 mt-2">Tu UID: ' + user.uid + '</p>';
                return;
            }
            
            try {
                // Create admin
                await db.collection('admins').doc(user.uid).set({
                    nombre: user.displayName || 'Admin',
                    email: user.email || 'admin@adma.com',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                
                // Create comunidad
                await db.collection('comunidades').add({
                    nombre: 'Comunidad Principal',
                    codigo: 'ADMA-24',
                    liderId: user.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                document.getElementById('status').innerHTML = '<p class="text-green-400 text-xl">✓ Admin creado!</p><a href="/" class="inline-block mt-4 bg-yellow-400 text-black font-bold py-2 px-4 rounded-xl">Ir al Dashboard</a>';
            } catch(e) {
                document.getElementById('status').innerHTML = '<p class="text-red-400">Error: ' + e.message + '</p>';
            }
        });
    </script>
</body>
</html>
